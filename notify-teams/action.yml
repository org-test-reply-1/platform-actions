name: Notify Teams
description: 'Manda una notifica su Microsoft Teams'

inputs:
  webhook-url:
    description: 'URL del webhook di Teams'
    required: true
  title:
    description: 'Titolo del messaggio'
    required: true
  message:
    description: 'Corpo del messaggio'
    required: true
  color:
    description: 'Colore del messaggio (green, red, orange)'
    required: false
    default: 'green'
  attachment:
    description: 'Testo aggiuntivo da mandare come secondo messaggio'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Manda notifica Teams
      shell: bash
      env:
        WEBHOOK_URL: ${{ inputs.webhook-url }}
        TITLE: ${{ inputs.title }}
        MESSAGE: ${{ inputs.message }}
        ATTACHMENT: ${{ inputs.attachment }}
      run: |
        case "${{ inputs.color }}" in
          red)    COLOR="FF0000" ;;
          orange) COLOR="FFA500" ;;
          *)      COLOR="00FF00" ;;
        esac

        # Escape per JSON
        TITLE_ESC=$(echo "$TITLE" | sed 's/"/\\"/g')
        MESSAGE_ESC=$(echo "$MESSAGE" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')

        curl -s -X POST "${WEBHOOK_URL}" \
          -H "Content-Type: application/json" \
          -d "{
            \"type\": \"message\",
            \"attachments\": [{
              \"contentType\": \"application/vnd.microsoft.card.adaptive\",
              \"content\": {
                \"\$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\",
                \"type\": \"AdaptiveCard\",
                \"version\": \"1.2\",
                \"body\": [
                  {
                    \"type\": \"TextBlock\",
                    \"text\": \"${TITLE_ESC}\",
                    \"weight\": \"Bolder\",
                    \"size\": \"Medium\",
                    \"color\": \"$([ "${{ inputs.color }}" = "red" ] && echo "Attention" || echo "Good")\"
                  },
                  {
                    \"type\": \"TextBlock\",
                    \"text\": \"${MESSAGE_ESC}\",
                    \"wrap\": true
                  }
                ]
              }
            }]
          }"

        if [ -n "${ATTACHMENT}" ]; then
          ATTACH_ESC=$(echo "$ATTACHMENT" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          curl -s -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"message\",
              \"attachments\": [{
                \"contentType\": \"application/vnd.microsoft.card.adaptive\",
                \"content\": {
                  \"\$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\",
                  \"type\": \"AdaptiveCard\",
                  \"version\": \"1.2\",
                  \"body\": [
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"📄 Summary dettagliato\",
                      \"weight\": \"Bolder\"
                    },
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"${ATTACH_ESC}\",
                      \"wrap\": true
                    }
                  ]
                }
              }]
            }"
        fi
