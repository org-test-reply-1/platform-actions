name: Notify Teams
description: 'Manda una notifica su Microsoft Teams'

inputs:
  webhook-url:
    description: 'URL del webhook di Teams'
    required: true
  title:
    description: 'Titolo del messaggio'
    required: true
  message:
    description: 'Corpo del messaggio'
    required: true
  color:
    description: 'Colore del messaggio (green, red, orange)'
    required: false
    default: 'green'
  attachment:
    description: 'Testo aggiuntivo da mandare come secondo messaggio'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Manda notifica Teams
      shell: bash
      env:
        WEBHOOK_URL: ${{ inputs.webhook-url }}
        TITLE: ${{ inputs.title }}
        MESSAGE: ${{ inputs.message }}
        ATTACHMENT: ${{ inputs.attachment }}
      run: |
        case "${{ inputs.color }}" in
          red)    COLOR="FF0000" ;;
          orange) COLOR="FFA500" ;;
          *)      COLOR="00FF00" ;;
        esac

        curl -s -X POST "${WEBHOOK_URL}" \
          -H "Content-Type: application/json" \
          -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"http://schema.org/extensions\",
            \"themeColor\": \"${COLOR}\",
            \"summary\": \"${TITLE}\",
            \"sections\": [{
              \"activityTitle\": \"${TITLE}\",
              \"activityText\": \"${MESSAGE}\"
            }]
          }"

        if [ -n "${ATTACHMENT}" ]; then
          curl -s -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{
              \"@type\": \"MessageCard\",
              \"@context\": \"http://schema.org/extensions\",
              \"themeColor\": \"${COLOR}\",
              \"summary\": \"Summary dettagliato\",
              \"sections\": [{
                \"activityTitle\": \"📄 Summary dettagliato\",
                \"activityText\": \"${ATTACHMENT}\"
              }]
            }"
        fi
