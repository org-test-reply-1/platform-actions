name: Copilot Run Agent
description: 'Crea una issue di scan AI e la assegna al Coding Agent (@copilot) per analisi completa del codice'

inputs:
  task-prompt:
    description: 'Prompt dettagliato per il Coding Agent'
    required: false
    default: |
      ## 🔍 Analisi completa del codice sorgente

      Scansiona **tutto** il codice sorgente di questa repository, inclusi:
      - Workflow e pipeline CI/CD (`.github/workflows/`)
      - Script (PowerShell, Bash)
      - Dockerfile e configurazioni container
      - Codice applicativo (.cs, .csproj, .json, .xml, .config)
      - File di configurazione e secrets management

      ### Obiettivi dell'analisi:
      1. **Sicurezza**: identifica vulnerabilità, secrets hardcoded, injection, misconfiguration
      2. **Qualità del codice**: code smells, duplicazioni, complessità eccessiva
      3. **Best practices**: pattern mancanti, configurazioni non ottimali
      4. **Pipeline**: problemi nei workflow, permessi eccessivi, mancanza di validazioni

      ### Output richiesto:
      - Report dettagliato con severity (CRITICAL, HIGH, MEDIUM, LOW)
      - Per ogni problema: descrizione, file interessato, linea (se possibile), fix suggerito
      - Proponi una **Pull Request** con i fix per i problemi di sicurezza CRITICAL e HIGH
      - Includi un sommario della qualità complessiva del codice
  scan-paths:
    description: 'Path da scansionare (default: tutto il repo)'
    required: false
    default: '.'
  issue-title:
    description: 'Titolo della issue'
    required: false
    default: '🤖 AI Security & Quality Scan'
  labels:
    description: 'Labels per la issue (comma-separated)'
    required: false
    default: 'copilot-auto,security,code-quality'
  assign-pat:
    description: 'PAT fine-grained con Issues Read/Write e Contents Read/Write'
    required: true

outputs:
  issue-url:
    description: 'URL della issue creata'
    value: ${{ steps.create-issue.outputs.issue_url }}
  issue-number:
    description: 'Numero della issue creata'
    value: ${{ steps.create-issue.outputs.issue_number }}

runs:
  using: composite
  steps:
    - name: Raccogli struttura repository
      id: context
      shell: bash
      run: |
        echo "📂 Raccolta struttura repository per contesto issue..."
        {
          echo "## 📁 Struttura Repository"
          echo '```'
          find ${{ inputs.scan-paths }} -maxdepth 4 -type f \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './bin/*' \
            -not -path './obj/*' \
            -not -path './.vs/*' \
            -not -name '*.dll' -not -name '*.exe' \
            -not -name '*.png' -not -name '*.jpg' -not -name '*.zip' \
            2>/dev/null | sort | head -150 || true
          echo '```'
          echo ""
          echo "## 📊 Statistiche"
          echo "- **File totali**: $(find ${{ inputs.scan-paths }} -type f -not -path './.git/*' 2>/dev/null | wc -l)"
          echo "- **Workflow YAML**: $(find . -name '*.yml' -o -name '*.yaml' | grep -v '.git' | wc -l)"
          echo "- **Dockerfile**: $(find . -name 'Dockerfile*' | wc -l)"
          echo "- **Script**: $(find . \( -name '*.ps1' -o -name '*.sh' \) | grep -v '.git' | wc -l)"
          echo "- **Codice .NET**: $(find . -name '*.cs' -o -name '*.csproj' | wc -l)"
        } > repo-structure.md 2>/dev/null || echo "Errore raccolta struttura" > repo-structure.md

    - name: Crea issue per Coding Agent
      id: create-issue
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.assign-pat }}
      run: |
        REPO="${{ github.repository }}"
        TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")

        # Costruisci il body della issue
        cat > issue-body.md << 'EOF'
        ${{ inputs.task-prompt }}
        EOF

        cat >> issue-body.md << EOF

        ---

        ### 📋 Contesto automatico

        **Repository**: ${REPO}
        **Branch**: ${{ github.ref_name }}
        **Commit**: ${{ github.sha }}
        **Timestamp**: ${TIMESTAMP}
        **Trigger**: Pipeline AI Security Scan

        EOF

        cat repo-structure.md >> issue-body.md 2>/dev/null || true

        cat >> issue-body.md << 'EOF'

        ---

        ### ⚡ Azioni richieste al Coding Agent:
        1. Analizza tutto il codice sorgente della repository
        2. Genera un report dettagliato con le criticità trovate
        3. **Apri una Pull Request** con i fix per i problemi CRITICAL e HIGH
        4. Commenta questa issue con il report completo
        EOF

        # Crea la issue
        ISSUE_URL=$(gh issue create \
          --repo "$REPO" \
          --title "${{ inputs.issue-title }} - ${TIMESTAMP}" \
          --body-file issue-body.md \
          --label "${{ inputs.labels }}" 2>&1)

        echo "issue_url=${ISSUE_URL}" >> $GITHUB_OUTPUT

        # Estrai numero issue
        ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oP '/issues/\K[0-9]+' || echo "")
        echo "issue_number=${ISSUE_NUMBER}" >> $GITHUB_OUTPUT
        echo "✅ Issue creata: ${ISSUE_URL}"

    - name: Assegna a @copilot (Coding Agent)
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.assign-pat }}
      run: |
        ISSUE_NUMBER="${{ steps.create-issue.outputs.issue_number }}"
        REPO="${{ github.repository }}"

        if [ -z "$ISSUE_NUMBER" ]; then
          echo "⚠️ Numero issue non disponibile, skip assegnazione"
          exit 0
        fi

        echo "🤖 Assegnazione issue #${ISSUE_NUMBER} a @copilot..."

        # Metodo 1: GraphQL (più affidabile per @copilot)
        ISSUE_NODE_ID=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}" --jq '.node_id' 2>/dev/null || echo "")
        COPILOT_NODE_ID=$(gh api "/users/copilot" --jq '.node_id' 2>/dev/null || echo "")

        if [ -n "$ISSUE_NODE_ID" ] && [ -n "$COPILOT_NODE_ID" ]; then
          gh api graphql -f query='
            mutation {
              updateIssue(input: {
                id: "'"${ISSUE_NODE_ID}"'"
                assigneeIds: ["'"${COPILOT_NODE_ID}"'"]
              }) {
                issue {
                  url
                  assignees(first: 5) {
                    nodes { login }
                  }
                }
              }
            }
          ' 2>/dev/null && echo "✅ Issue #${ISSUE_NUMBER} assegnata a @copilot via GraphQL" || {
            echo "⚠️ GraphQL fallito, tentativo con gh issue edit..."
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-assignee "copilot" 2>/dev/null || \
              echo "⚠️ Assign fallback: verificare manualmente issue #${ISSUE_NUMBER}"
          }
        else
          # Fallback diretto
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-assignee "copilot" 2>/dev/null || \
            echo "⚠️ Assegnazione @copilot non riuscita — il Coding Agent potrebbe comunque processarla via label"
        fi

    - name: Summary
      shell: bash
      run: |
        echo "## 🤖 AI Security & Quality Scan" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Issue creata e assegnata al Coding Agent**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Campo | Valore |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Issue | ${{ steps.create-issue.outputs.issue_url }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Numero | #${{ steps.create-issue.outputs.issue_number }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Assegnata a | @copilot |" >> $GITHUB_STEP_SUMMARY
        echo "| Repository | ${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ⏳ Prossimi passi (automatici)" >> $GITHUB_STEP_SUMMARY
        echo "1. Il Coding Agent analizzerà il codice sorgente" >> $GITHUB_STEP_SUMMARY
        echo "2. Commenterà la issue con il report" >> $GITHUB_STEP_SUMMARY
        echo "3. Aprirà una PR con i fix per problemi CRITICAL/HIGH" >> $GITHUB_STEP_SUMMARY
