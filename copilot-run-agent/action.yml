name: Copilot Run Agent
description: 'Esegue un agente Copilot con un task personalizzato'

inputs:
  agent-file:
    description: 'Path al file agent markdown (.agent.md)'
    required: true
  task-prompt:
    description: 'Prompt del task da eseguire'
    required: true
  output-file:
    description: 'File di output per il risultato dell''agente'
    required: true
  copilot-token:
    description: 'Token GitHub con accesso a Copilot'
    required: true

runs:
  using: composite
  steps:
    - name: Verifica agent file
      shell: bash
      run: |
        if [ ! -f "${{ inputs.agent-file }}" ]; then
          echo "⚠️ Agent file non trovato: ${{ inputs.agent-file }}"
          echo "Creazione di un agent generico di fallback..."
          mkdir -p "$(dirname "${{ inputs.agent-file }}")"
          cat > "${{ inputs.agent-file }}" << 'EOF'
        # Security Reporter Agent

        You are a security analysis agent. Your task is to analyze code for security vulnerabilities.

        ## Instructions
        1. Scan the provided codebase paths
        2. Identify security vulnerabilities
        3. Categorize findings by severity (CRITICAL, HIGH, MEDIUM, LOW)
        4. Provide clear, actionable recommendations

        ## Output Format
        Use markdown format with clear sections for each vulnerability found.
        EOF
        fi

    - name: Autentica gh CLI per Copilot
      shell: bash
      run: |
        echo "${{ inputs.copilot-token }}" | gh auth login --with-token
        echo "✅ gh auth login completato"
        gh auth status >> copilot-debug.log 2>&1 || true

    - name: Esegui agente Copilot
      shell: bash
      run: |
        echo "🤖 Esecuzione agente Copilot..."
        echo "Agent: ${{ inputs.agent-file }}"
        echo "Output: ${{ inputs.output-file }}"

        # Crea directory output se non esiste
        mkdir -p "$(dirname "${{ inputs.output-file }}")"

        # Scrivi info di debug
        echo "# Copilot CLI Debug" > copilot-debug.log
        echo "Data: $(date -u)" >> copilot-debug.log
        echo "Versione Copilot CLI:" >> copilot-debug.log
        gh copilot --version >> copilot-debug.log 2>&1 || echo "Copilot CLI non disponibile" >> copilot-debug.log
        echo "Auth status:" >> copilot-debug.log
        gh auth status >> copilot-debug.log 2>&1 || true

        # Esegui il comando copilot senza GH_TOKEN (usa la sessione gh auth)
        {
          gh copilot -p "${{ inputs.task-prompt }}" 2>&1 || \
          echo "⚠️ Copilot command failed"
        } > "${{ inputs.output-file }}" 2>>copilot-debug.log

        # Verifica che l'output sia stato generato
        if [ ! -f "${{ inputs.output-file }}" ] || [ ! -s "${{ inputs.output-file }}" ]; then
          echo "⚠️ Generazione report fallita o vuota" | tee -a copilot-debug.log
          echo "# Security Scan Report" > "${{ inputs.output-file }}"
          echo "" >> "${{ inputs.output-file }}"
          echo "⚠️ Impossibile completare la scansione di sicurezza." >> "${{ inputs.output-file }}"
          echo "" >> "${{ inputs.output-file }}"
          echo "**Status**: Incomplete" >> "${{ inputs.output-file }}"
          echo "**Timestamp**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> "${{ inputs.output-file }}"
          echo "" >> "${{ inputs.output-file }}"
          echo "**Task Prompt**: ${{ inputs.task-prompt }}" >> "${{ inputs.output-file }}"
        fi

        echo "✅ Report generato: ${{ inputs.output-file }}"

    - name: Mostra preview report
      shell: bash
      run: |
        echo "📄 Preview del report generato:"
        head -n 20 "${{ inputs.output-file }}" || true
