name: Copilot Run Agent
description: 'Esegue un agente AI per analisi del codice tramite GitHub Models API'

inputs:
  agent-file:
    description: 'Path al file agent markdown (.agent.md)'
    required: true
  task-prompt:
    description: 'Prompt del task da eseguire'
    required: true
  output-file:
    description: 'File di output per il risultato dell''agente'
    required: true
  copilot-token:
    description: 'Token GitHub con accesso a Copilot/Models API'
    required: true
  model:
    description: 'Modello AI da usare (default: gpt-4o-mini)'
    required: false
    default: 'gpt-4o-mini'

runs:
  using: composite
  steps:
    - name: Verifica agent file
      shell: bash
      run: |
        if [ ! -f "${{ inputs.agent-file }}" ]; then
          echo "⚠️ Agent file non trovato: ${{ inputs.agent-file }}"
          echo "Creazione di un agent generico di fallback..."
          mkdir -p "$(dirname "${{ inputs.agent-file }}")"
          cat > "${{ inputs.agent-file }}" << 'EOF'
        # Security Reporter Agent

        You are a security analysis agent. Your task is to analyze code for security vulnerabilities.

        ## Instructions
        1. Scan the provided codebase paths
        2. Identify security vulnerabilities
        3. Categorize findings by severity (CRITICAL, HIGH, MEDIUM, LOW)
        4. Provide clear, actionable recommendations

        ## Output Format
        Use markdown format with clear sections for each vulnerability found.
        EOF
        fi

    - name: Raccogli contesto del codice
      shell: bash
      run: |
        echo "📂 Raccolta contesto del codice..."
        {
          echo "# Repository Structure"
          find . -maxdepth 3 -type f \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './bin/*' \
            -not -path './obj/*' \
            -not -path './.vs/*' \
            -not -name '*.dll' \
            -not -name '*.exe' \
            -not -name '*.png' \
            -not -name '*.jpg' \
            -not -name '*.zip' \
            2>/dev/null | head -200 | sort || true
          echo ""
          echo "# File Contents (rilevanti per sicurezza)"
          echo ""
          
          # Lista file rilevanti in modo più sicuro
          RELEVANT_FILES=$(find . -maxdepth 3 -type f \
            \( -name '*.yml' -o -name '*.yaml' -o -name '*.cs' -o -name '*.csproj' \
               -o -name '*.json' -o -name '*.ps1' -o -name '*.sh' -o -name '*.md' \
               -o -name 'Dockerfile*' -o -name '*.config' -o -name '*.xml' \) \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './bin/*' \
            -not -path './obj/*' \
            2>/dev/null | head -50 | sort || true)
          
          TOTAL_SIZE=0
          MAX_SIZE=30000
          echo "$RELEVANT_FILES" | while IFS= read -r f; do
            if [ -n "$f" ] && [ -f "$f" ]; then
              FILE_SIZE=$(wc -c < "$f" 2>/dev/null || echo 0)
              TOTAL_SIZE=$((TOTAL_SIZE + FILE_SIZE))
              if [ "$TOTAL_SIZE" -gt "$MAX_SIZE" ]; then
                echo "... (troncato per dimensione: ${TOTAL_SIZE} bytes)"
                break
              fi
              echo "## File: $f"
              echo '```'
              head -100 "$f" 2>/dev/null || echo "(impossibile leggere)"
              echo '```'
              echo ""
            fi
          done
        } > code-context.txt 2>/dev/null || echo "Errore nella raccolta contesto" > code-context.txt
        echo "✅ Contesto raccolto: $(wc -c < code-context.txt 2>/dev/null || echo 0) bytes"

    - name: Esegui analisi AI tramite GitHub Models API
      shell: bash
      run: |
        set -e  # Ferma su errori
        echo "🤖 Esecuzione analisi AI..."
        echo "Agent: ${{ inputs.agent-file }}"
        echo "Output: ${{ inputs.output-file }}"
        echo "Model: ${{ inputs.model }}"

        mkdir -p "$(dirname "${{ inputs.output-file }}")"

        # Verifica che il file di contesto esista
        if [ ! -f "code-context.txt" ]; then
          echo "⚠️ File contesto non trovato, creo un contesto minimo..."
          echo "# Repository Scan - Errore nel contesto" > code-context.txt
          echo "Impossibile raccogliere il contesto completo del codice." >> code-context.txt
        fi

        SYSTEM_PROMPT=$(cat "${{ inputs.agent-file }}" 2>/dev/null || echo "Analyze code for security vulnerabilities.")
        CODE_CONTEXT=$(cat code-context.txt 2>/dev/null || echo "No context available")

        USER_PROMPT="${{ inputs.task-prompt }}

        --- CODICE DELLA REPOSITORY ---
        ${CODE_CONTEXT}"

        echo "# AI Analysis Debug" > copilot-debug.log
        echo "Data: $(date -u)" >> copilot-debug.log
        echo "Modello: ${{ inputs.model }}" >> copilot-debug.log
        echo "Contesto: $(wc -c < code-context.txt 2>/dev/null || echo 0) bytes" >> copilot-debug.log

        # Crea il payload JSON in modo più sicuro usando printf e jq
        printf '%s' "$SYSTEM_PROMPT" > system_prompt.txt
        printf '%s' "$USER_PROMPT" > user_prompt.txt
        
        # Costruisci il JSON usando jq per evitare problemi di escape
        jq -n \
          --rawfile system system_prompt.txt \
          --rawfile user user_prompt.txt \
          --arg model "${{ inputs.model }}" \
          '{
            model: $model,
            messages: [
              {role: "system", content: $system},
              {role: "user", content: $user}
            ],
            max_tokens: 4096,
            temperature: 0.3
          }' > request.json

        echo "Payload JSON creato: $(wc -c < request.json) bytes" >> copilot-debug.log

        RESPONSE=$(curl -s -w "\n%{http_code}" \
          "https://models.github.ai/inference/chat/completions" \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Content-Type: application/json" \
          -d @request.json 2>>copilot-debug.log || echo -e "curl_error\n500")

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | sed '$d')

        echo "HTTP Status: ${HTTP_CODE}" >> copilot-debug.log

        if [ "$HTTP_CODE" = "200" ]; then
          echo "$BODY" | jq -r '.choices[0].message.content' > "${{ inputs.output-file }}" 2>/dev/null || {
            echo "# AI Security Scan Report" > "${{ inputs.output-file }}"
            echo "" >> "${{ inputs.output-file }}"
            echo "✅ **Scansione completata** ma errore nel parsing della risposta AI." >> "${{ inputs.output-file }}"
            echo "" >> "${{ inputs.output-file }}"
            echo "**Raw Response**:" >> "${{ inputs.output-file }}"
            echo '```json' >> "${{ inputs.output-file }}"
            echo "$BODY" | head -50 >> "${{ inputs.output-file }}"
            echo '```' >> "${{ inputs.output-file }}"
          }
          echo "✅ Report generato con successo: ${{ inputs.output-file }}"
        else
          echo "❌ Errore API (HTTP ${HTTP_CODE})" | tee -a copilot-debug.log
          echo "Response: ${BODY}" >> copilot-debug.log
          echo "# AI Security Scan Report" > "${{ inputs.output-file }}"
          echo "" >> "${{ inputs.output-file }}"
          echo "⚠️ Errore durante la scansione AI (HTTP ${HTTP_CODE})." >> "${{ inputs.output-file }}"
          echo "" >> "${{ inputs.output-file }}"
          echo "**Status**: Failed" >> "${{ inputs.output-file }}"
          echo "**Timestamp**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> "${{ inputs.output-file }}"
          echo "**HTTP Code**: ${HTTP_CODE}" >> "${{ inputs.output-file }}"
          echo "" >> "${{ inputs.output-file }}"
          echo "**Error Response**:" >> "${{ inputs.output-file }}"
          echo '```' >> "${{ inputs.output-file }}"
          echo "${BODY}" | head -20 >> "${{ inputs.output-file }}"
          echo '```' >> "${{ inputs.output-file }}"
        fi

        # Cleanup
        rm -f request.json system_prompt.txt user_prompt.txt 2>/dev/null || true
      env:
        GH_TOKEN: ${{ inputs.copilot-token }}

    - name: Mostra preview report
      shell: bash
      run: |
        echo "📄 Preview del report generato:"
        head -n 30 "${{ inputs.output-file }}" || true
