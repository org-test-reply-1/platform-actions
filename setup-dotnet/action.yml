name: Setup .NET
description: "Installs the .NET SDK and restores dependencies"

inputs:
  dotnet-version:
    description: ".NET SDK version to install"
    required: false
    default: "9.0.x"
  project-path:
    description: "Path to the project or solution for restore"
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Install .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Restore NuGet packages
      shell: bash
      run: dotnet restore ${{ inputs.project-path }}
