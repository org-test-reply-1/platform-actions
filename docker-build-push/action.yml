name: Docker Build & Push (ARC Runner)
description: >
  Costruisce e pubblica la custom runner image su GHCR con tag semver.

inputs:
  registry:
    description: "Container registry"
    required: false
    default: "ghcr.io"

  image_name:
    description: "Nome immagine (es: org/aks-arc-runner)"
    required: true

  version:
    description: "Versione semver (es: 1.2.3). Se vuoto viene auto-incrementata la patch dall'ultima tag Git."
    required: false
    default: ""

  dockerfile_path:
    required: false
    default: "./arc-runner-image/Dockerfile"

  context_path:
    required: false
    default: "./arc-runner-image"

outputs:
  image_full_tag:
    description: "Tag completo pubblicato (registry/image:tag)"
    value: ${{ steps.meta.outputs.full_tag }}

  version:
    description: "Versione semver usata (es: 1.2.3)"
    value: ${{ steps.meta.outputs.version }}

  image_digest:
    description: "Digest SHA dell'immagine pubblicata"
    value: ${{ steps.push.outputs.digest }}

runs:
  using: composite
  steps:
    # ------------------------------------------------------------------ #
    # 1. Calcola versione semver
    #    - Se l'input version è fornito, lo usa direttamente
    #    - Altrimenti legge l'ultima tag Git (vX.Y.Z) e incrementa la patch
    #    - Se non esistono tag, parte da 0.1.0
    # ------------------------------------------------------------------ #
    - name: Calcola versione semver
      id: meta
      shell: bash
      run: |
        INPUT_VERSION="${{ inputs.version }}"

        if [ -n "$INPUT_VERSION" ]; then
          # Usa la versione passata esplicitamente (strip del prefisso v se presente)
          VERSION="${INPUT_VERSION#v}"
        else
          # Leggi l'ultima tag Git semver
          LAST_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)

          if [ -z "$LAST_TAG" ]; then
            VERSION="0.1.0"
          else
            # Estrai major minor patch e incrementa patch
            MAJOR=$(echo "$LAST_TAG" | sed 's/v\([0-9]*\)\..*/\1/')
            MINOR=$(echo "$LAST_TAG" | sed 's/v[0-9]*\.\([0-9]*\)\..*/\1/')
            PATCH=$(echo "$LAST_TAG" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\).*/\1/')
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
        fi

        FULL="${{ inputs.registry }}/${{ inputs.image_name }}:${VERSION}"
        FULL_LATEST="${{ inputs.registry }}/${{ inputs.image_name }}:latest"

        echo "version=${VERSION}"       >> "$GITHUB_OUTPUT"
        echo "full_tag=${FULL}"         >> "$GITHUB_OUTPUT"
        echo "full_latest=${FULL_LATEST}" >> "$GITHUB_OUTPUT"
        echo "Versione: ${VERSION}"
        echo "Tag: ${FULL}"

    # ------------------------------------------------------------------ #
    # 2. Login a GHCR
    # ------------------------------------------------------------------ #
    - name: Login a ghcr.io
      shell: bash
      run: |
        echo "${{ github.token }}" | docker login ghcr.io \
          --username ${{ github.actor }} \
          --password-stdin

    # ------------------------------------------------------------------ #
    # 3. Build — tagga sia versione che latest
    # ------------------------------------------------------------------ #
    - name: Docker build
      shell: bash
      run: |
        docker build \
          --file ${{ inputs.dockerfile_path }} \
          --tag ${{ steps.meta.outputs.full_tag }} \
          --tag ${{ steps.meta.outputs.full_latest }} \
          --label "org.opencontainers.image.source=${{ github.repositoryUrl }}" \
          --label "org.opencontainers.image.revision=${{ github.sha }}" \
          --label "org.opencontainers.image.version=${{ steps.meta.outputs.version }}" \
          --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          ${{ inputs.context_path }}

    # ------------------------------------------------------------------ #
    # 4. Push — pusha sia versione che latest
    # ------------------------------------------------------------------ #
    - name: Docker push
      id: push
      shell: bash
      run: |
        docker push ${{ steps.meta.outputs.full_tag }}
        docker push ${{ steps.meta.outputs.full_latest }}

        DIGEST=$(docker inspect \
          --format='{{index .RepoDigests 0}}' \
          ${{ steps.meta.outputs.full_tag }} 2>/dev/null \
          || docker image inspect \
          --format='{{.Id}}' \
          ${{ steps.meta.outputs.full_tag }})
        echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

    # ------------------------------------------------------------------ #
    # 5. Crea tag Git per la versione pushata
    # ------------------------------------------------------------------ #
    - name: Crea tag Git
      shell: bash
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "v${{ steps.meta.outputs.version }}" || echo "Tag già esistente, skip"
        git push origin "v${{ steps.meta.outputs.version }}" || echo "Push tag fallito, skip"

    # ------------------------------------------------------------------ #
    # 6. Summary
    # ------------------------------------------------------------------ #
    - name: Summary
      shell: bash
      run: |
        echo "### Docker Build & Push completato" >> "$GITHUB_STEP_SUMMARY"
        echo "| Campo | Valore |" >> "$GITHUB_STEP_SUMMARY"
        echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
        echo "| Versione | \`${{ steps.meta.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
        echo "| Immagine | \`${{ steps.meta.outputs.full_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
        echo "| Latest | \`${{ steps.meta.outputs.full_latest }}\` |" >> "$GITHUB_STEP_SUMMARY"
        echo "| Digest | \`${{ steps.push.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
        echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
