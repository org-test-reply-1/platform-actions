name: Docker Build & Push
description: "Build a Docker image and push it to a registry (dry-run by default)"

inputs:
  image-name:
    description: "Image name, e.g. myorg/myapp"
    required: true
  registry:
    description: "Container registry host"
    required: false
    default: "ghcr.io"
  dockerfile:
    description: "Path to Dockerfile"
    required: false
    default: "./Dockerfile"
  context:
    description: "Docker build context"
    required: false
    default: "."
  registry-username:
    description: "Registry username"
    required: true
  registry-password:
    description: "Registry password / token"
    required: true
  dry-run:
    description: "Skip actual push (true/false)"
    required: false
    default: "true"

outputs:
  full-tag:
    description: "Full image:tag that was built"
    value: ${{ steps.tag.outputs.full-tag }}

runs:
  using: composite
  steps:
    - name: Compute tag
      id: tag
      shell: bash
      run: |
        SHORT_SHA="${GITHUB_SHA::7}"
        REF_SLUG="${GITHUB_REF_NAME//\//-}"
        FULL_TAG="${{ inputs.registry }}/${{ inputs.image-name }}:${REF_SLUG}-${SHORT_SHA}"
        echo "full-tag=${FULL_TAG}" >> "$GITHUB_OUTPUT"

    - name: Login to registry
      shell: bash
      run: |
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          echo "[DRY-RUN] Skipping login to ${{ inputs.registry }}"
        else
          echo "${{ inputs.registry-password }}" | \
            docker login ${{ inputs.registry }} -u "${{ inputs.registry-username }}" --password-stdin
        fi

    - name: Build image
      shell: bash
      run: |
        docker build \
          -f ${{ inputs.dockerfile }} \
          -t ${{ steps.tag.outputs.full-tag }} \
          ${{ inputs.context }}
        echo "Built: ${{ steps.tag.outputs.full-tag }}"

    - name: Push image
      shell: bash
      run: |
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          echo "[DRY-RUN] Would push: ${{ steps.tag.outputs.full-tag }}"
        else
          docker push ${{ steps.tag.outputs.full-tag }}
        fi

    - name: Write job summary
      shell: bash
      run: |
        echo "### Docker Build" >> $GITHUB_STEP_SUMMARY
        echo "| | |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| Image | \`${{ steps.tag.outputs.full-tag }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Push  | ${{ inputs.dry-run == 'true' && 'dry-run' || 'pushed' }} |" >> $GITHUB_STEP_SUMMARY
