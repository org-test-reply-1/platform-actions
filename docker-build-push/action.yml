name: Docker Build & Push
description: "Builds a Docker image and pushes it to a container registry (dry-run by default)"

inputs:
  image-name:
    description: "Full image name including registry, e.g. ghcr.io/myorg/myapp"
    required: true
  tag:
    description: "Image tag"
    required: false
    default: "latest"
  dockerfile:
    description: "Path to Dockerfile"
    required: false
    default: "./Dockerfile"
  context:
    description: "Build context path"
    required: false
    default: "."
  dry-run:
    description: "Skip actual push (true/false)"
    required: false
    default: "true"

outputs:
  full-tag:
    description: "The full image:tag that was built"
    value: ${{ steps.build.outputs.full-tag }}

runs:
  using: composite
  steps:
    - name: Build image
      id: build
      shell: bash
      run: |
        FULL_TAG="${{ inputs.image-name }}:${{ inputs.tag }}"
        docker build -f ${{ inputs.dockerfile }} -t "${FULL_TAG}" ${{ inputs.context }}
        echo "full-tag=${FULL_TAG}" >> "$GITHUB_OUTPUT"
        echo "Built: ${FULL_TAG}"

    - name: Push image
      shell: bash
      run: |
        FULL_TAG="${{ inputs.image-name }}:${{ inputs.tag }}"
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          echo "[DRY-RUN] Skipping push of: ${FULL_TAG}"
        else
          docker push "${FULL_TAG}"
          echo "Pushed: ${FULL_TAG}"
        fi
